name: Test Variable

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Print variable in bash
        env:
          MY_VAR: "Hello from workflow"
        run: echo "Bash: $MY_VAR"

      - name: Print variable in Python
        env:
          MY_VAR: "Hello from workflow"
        run: python3 -c "import os; print('Python:', os.getenv('MY_VAR'))"
