name: setting-variable

on:
  workflow_dispatch:

env:
  MY_VAR: "Hello from workflow-jelena"

jobs:
  show-variable:
    runs-on: ubuntu-latest
    steps:
      - name: First echo
        run: echo "something"

      - name: Print env variable
        run: echo $MY_VAR

      - name: Print env variable using Python
        run: |
          python -c "import os; print(os.environ.get('MY_VAR'))"
