name: Test Variable

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MY_VAR: "Hello from workflow"

    steps:
      - name: Print in bash
        run: echo "Bash: $MY_VAR"

      - name: Print in Python
        run: python3 -c "import os; print('Python:', os.getenv('MY_VAR'))"
