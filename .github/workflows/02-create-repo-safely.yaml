name: Create Repo Safely (API)

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Repository name"
        required: true
      visibility:
        description: "public or private"
        required: true
        type: choice
        options:
          - public
          - private

jobs:
  create-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Check if repo exists
        id: check
        env:
          TOKEN: ${{ secrets.NEW_PAT }}
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.inputs.repo_name }}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$OWNER/$REPO)

          echo "http=$HTTP_CODE" >> $GITHUB_OUTPUT

      - name: Create repo if not exists
        if: steps.check.outputs.http == '404'
        env:
          TOKEN: ${{ secrets.NEW_PAT }}
        run: |
          curl -X POST https://api.github.com/user/repos \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d '{
              "name": "${{ github.event.inputs.repo_name }}",
              "private": ${{ github.event.inputs.visibility == 'private' }}
            }'

      - name: Already exists
        if: steps.check.outputs.http == '200'
        run: echo "Repository already exists, nothing to do"

      - name: Unexpected response
        if: steps.check.outputs.http != '200' && steps.check.outputs.http != '404'
        run: |
          echo "Unexpected response code: ${{ steps.check.outputs.http }}"
          exit 1
