name: Simple Python Workflow

on:
  workflow_dispatch:
    inputs:
      value:
        description: "Enter a or b"
        required: true
        type: choice
        options:
          - a
          - b

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run script
        run: python script.py "${{ github.event.inputs.value }}"
